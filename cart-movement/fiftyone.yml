name: "@egocart/cart-movement"
type: plugin
version: "1.0.0"
description: >
  Floorplan visualisations for the egocart_videos dataset.
  Provides a static 4-up Plotly panel (KDE density, trajectories,
  zone map, orientation field) and an operator that converts the flat
  video dataset to a grouped dataset with each plot type as its own
  group slice.
author: "@harpreetsahota"
fiftyone:
  version: ">=0.23"

operators:
  - add_floorplan_slices

panels:
  - floorplan_panel
